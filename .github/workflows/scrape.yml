name: Scrape News

permissions:
  contents: write

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd scraper
          pip install feedparser requests beautifulsoup4 scikit-learn numpy
      
      - name: Run scraper
        run: |
          cd scraper
          python pipeline.py
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/news_pulse.db
          git diff --staged --quiet || (git commit -m "Auto-update news data - $(date)" && git push)
